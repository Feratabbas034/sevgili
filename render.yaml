services:
  - type: web
    name: luna-protocol
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: ADMIN_KEY
        generateValue: true
    disk:
      name: luna-protocol-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
